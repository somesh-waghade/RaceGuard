version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: raceguard_redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional: run the app itself in Docker (uncomment if needed)
  # app:
  #   build: .
  #   container_name: raceguard_app
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - REDIS_URL=redis://redis:6379
